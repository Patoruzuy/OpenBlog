{% extends "base.html" %}
{% block title %}Unsubscribed{% endblock %}
{% block content %}
<div class="page-shell" style="max-width:480px;margin:4rem auto;text-align:center">
  <p style="font-family:monospace;font-weight:700;font-size:1.1rem;margin:0 0 16px">ob/ OpenBlog</p>
  <h1 style="font-size:1.5rem;font-weight:600;margin:0 0 12px">You've been unsubscribed</h1>
  <p style="color:var(--text-muted)">
    <strong>{{ email }}</strong> has been removed from the newsletter.
    You won't receive any more emails from us.
  </p>
  <a class="btn" href="{{ url_for('index.index') }}" style="margin-top:2rem;display:inline-block">Go home</a>
</div>
{% endblock %}
