<!doctype html>
<html>
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/></head>
<body style="font-family:system-ui,sans-serif;background:#0d0d0d;color:#e0e0e0;margin:0;padding:32px 16px">
  <div style="max-width:480px;margin:0 auto;background:#1a1a1a;border-radius:8px;padding:32px">
    <p style="font-family:monospace;font-weight:700;font-size:1.1rem;margin:0 0 24px">ob/ OpenBlog</p>
    <h1 style="font-size:1.25rem;font-weight:600;margin:0 0 12px">Welcome to the OpenBlog newsletter!</h1>
    <p style="color:#a8a8a8;margin:0 0 24px">You're confirmed. We'll send you updates when new posts and features land.</p>
    <a href="{{ site_url | default('https://openblog.dev') }}" style="display:inline-block;background:#4fafff;color:#000;font-weight:600;padding:12px 24px;border-radius:6px;text-decoration:none">Visit OpenBlog</a>
    <hr style="border:none;border-top:1px solid #2a2a2a;margin:24px 0"/>
    {% if unsubscribe_url %}
    <p style="color:#666;font-size:0.8rem;margin:0">Don't want these emails? <a href="{{ unsubscribe_url }}" style="color:#4fafff">Unsubscribe</a>.</p>
    {% endif %}
  </div>
</body>
</html>
