services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: openblog
      POSTGRES_USER: openblog
      POSTGRES_PASSWORD: openblog
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openblog -d openblog"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── Flask / Gunicorn ────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command:
      - celery
      - -A
      - backend.celery_worker.celery
      - worker
      - --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  # ── Celery Beat ─────────────────────────────────────────────────────────────
  # --schedule written to /tmp to avoid permission errors on read-only filesystems.
  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command:
      - celery
      - -A
      - backend.celery_worker.celery
      - beat
      - --loglevel=info
      - --scheduler=celery.beat.PersistentScheduler
      - --schedule=/tmp/celerybeat-schedule
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  # ── Nginx ───────────────────────────────────────────────────────────────────
  # Static files bind-mounted directly from ./backend/static — no init hacks.
  # In production with immutable images, replace bind-mount with a dedicated
  # nginx image stage that copies static/ at build time.
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:7080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/static:/srv/static:ro
    depends_on:
      - web

  # ── MailHog (dev SMTP) ──────────────────────────────────────────────────────
  # Web UI at http://localhost:8025 — catches all outgoing emails.
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"  # Web UI
      - "127.0.0.1:1025:1025"  # SMTP

volumes:
  pgdata:
