upstream gunicorn {
    server web:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options     "nosniff"                           always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;

    # CSP is Report-Only until Phase 7 (CodeMirror may require script-src adjustments).
    # Tighten to Content-Security-Policy once the editor is integrated.
    add_header Content-Security-Policy-Report-Only
        "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;"
        always;

    # HSTS intentionally omitted — enable only after TLS is configured at this server.
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Static files served directly by Nginx ─────────────────────────────────
    # Bind-mounted from ./backend/static in docker-compose.yml
    location /static/ {
        alias /srv/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health endpoints (no extra headers needed) ────────────────────────────
    location ~ ^/(livez|readyz)$ {
        proxy_pass http://gunicorn;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        access_log off;
    }

    # ── Application ───────────────────────────────────────────────────────────
    location / {
        proxy_pass             http://gunicorn;
        proxy_http_version     1.1;
        proxy_set_header       Connection          "";
        proxy_set_header       Host                $host;
        proxy_set_header       X-Real-IP           $remote_addr;
        proxy_set_header       X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto   $scheme;
        proxy_read_timeout     60s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_buffering        on;
        proxy_buffer_size      4k;
        proxy_buffers          8 4k;
    }
}
